---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hortusfox
  namespace: hortusfox
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hortusfox.47fc5c.com`)
      kind: Rule
      middlewares:
        - namespace: hortusfox
          name: hortusfox-ipallowlist
      services:
        - name: hortusfox
          kind: Service
          port: 80
          scheme: http
          sticky:
            cookie:
              httpOnly: true
              secure: true
              sameSite: none
  tls:
    secretName: hortusfox-certificate
