---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: navidrome
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - navidrome
  selector:
    matchLabels:
      app: navidrome
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
