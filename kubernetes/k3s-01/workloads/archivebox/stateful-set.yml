---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: archivebox
  namespace: archivebox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: archivebox
  template:
    metadata:
      labels:
        app: archivebox
    spec:
      containers:
        - name: archivebox
          image: docker.io/archivebox/archivebox:0.7.4@sha256:1a5a37331091d9df865ead2b9c231aa5a892fc26fe0422ce6140d9e2d9532327
          volumeMounts:
            - name: archivebox-data
              mountPath: /data
          envFrom:
            - configMapRef:
                name: archivebox
      volumes:
        - name: archivebox-data
          persistentVolumeClaim:
            claimName: archivebox-data-encrypted
