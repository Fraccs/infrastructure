---
apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-config
  namespace: renovate
data:
  config.json: |-
    {
      "dependencyDashboard": true,
      "extends": [
        ":prConcurrentLimitNone",
        ":prHourlyLimitNone",
        ":semanticCommitTypeAll(bump)",
        ":semanticCommitScopeDisabled"
      ],
      "enabledManagers": [
        "argocd",
        "helm-values",
        "kubernetes"
      ],
      "argocd": {
        "managerFilePatterns": ["/kubernetes/.+application\\.yml$/"]
      },
      "kubernetes": {
        "managerFilePatterns": [
          "/kubernetes/.+cron-job\\.yml$/",
          "/kubernetes/.+daemon-set\\.yml$/",
          "/kubernetes/.+deployment\\.yml$/",
          "/kubernetes/.+stateful-set\\.yml$/"
        ]
      },
      "major": {
        "dependencyDashboardApproval": true
      },
      "packageRules": [{
        "matchUpdateTypes": ["digest"],
        "enabled": false
      }],
      "repositories": ["fraccs/infrastructure"]
    }
