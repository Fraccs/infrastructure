---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  syncPolicy:
    automated:
      prune: true
  sources:
    - repoURL: http://gitea-http.gitea.svc.k3s-01.47fc5c.com:3000/fraccs/infrastructure.git
      targetRevision: HEAD
      path: kubernetes/k3s-01/workloads/traefik
    - repoURL: http://gitea-http.gitea.svc.k3s-01.47fc5c.com:3000/fraccs/infrastructure.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 39.0.7
      helm:
        valueFiles:
          - $values/kubernetes/k3s-01/workloads/traefik/values.yml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
